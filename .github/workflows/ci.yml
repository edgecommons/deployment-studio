name: ci
on:
  push:
    branches: [main]
  pull_request:

# The deployment engine lives in edgecommons/edgecommons (`edgecommons deployment …`); the
# byte-for-byte render proof is that repo's Dallas golden test. This repo is the design home:
# the deck, the reviews, the definition schema, and the golden fixture. CI keeps the fixture
# valid and the schema in sync with the copy the kernel embeds.
jobs:
  design-and-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: deployment-studio

      - uses: actions/checkout@v4
        with:
          repository: edgecommons/edgecommons
          token: ${{ secrets.EDGECOMMONS_READ_TOKEN || github.token }}
          path: edgecommons
          sparse-checkout: cli/crates/ec-deploy/schema

      - name: Fixture validates against the definition schema (S-1..S-9 + bindings)
        working-directory: deployment-studio
        run: |
          pip install --quiet jsonschema pyyaml
          python schema/validate.py fixtures/dallas/definition.yaml

      - name: The schema matches the copy the edgecommons kernel embeds
        run: |
          diff --strip-trailing-cr \
            deployment-studio/schema/deployment-definition.schema.json \
            edgecommons/cli/crates/ec-deploy/schema/deployment-definition.schema.json
