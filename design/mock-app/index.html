<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deployment Studio — high-fidelity mock</title>
  <!-- product.css is generated from the shipped Studio UI, so this mock cannot visually drift
       from the product: same Carbon build, same EdgeCommons brand-token mapping. -->
  <link rel="stylesheet" href="styles/edgecommons-tokens.css" />
  <link rel="stylesheet" href="styles/product.css" />
  <link rel="stylesheet" href="styles/mock.css" />
</head>
<body>
  <div class="ec-app ec-app--dark mock-shell">

    <!-- ── context bar: workspace ▸ draft ▸ evidence ▸ search ───────────────────────── -->
    <header class="mock-contextbar">
      <a class="mock-brand" href="#" aria-label="EdgeCommons">
        <img src="styles/logo-reversed.svg" alt="EdgeCommons" />
      </a>
      <span class="mock-product">Deployment Studio</span>

      <div class="mock-contextbar__group">
        <label class="mock-field">
          <span>Workspace</span>
          <select id="workspace-switch" class="mock-select"></select>
        </label>
        <span id="draft-chip"></span>
        <span id="evidence-chip"></span>
      </div>

      <div class="mock-contextbar__spacer"></div>
      <!-- Mock chrome, not product: reveals which agreed decision each region realises.
           Off by default so the screens read as the product, not as an argument for it. -->
      <label class="mock-toggle" title="Reviewer annotations — not part of the product UI">
        <input type="checkbox" id="notes-toggle" />
        <span>Design notes</span>
      </label>
      <input id="search" class="mock-search" type="search" placeholder="Search scopes, nodes, components…" aria-label="Search" />
    </header>

    <div class="mock-body">

      <!-- ── left rail: the context spine, then the global areas ───────────────────── -->
      <nav class="mock-rail" aria-label="Context spine and global areas">
        <div class="mock-rail__heading">Context</div>
        <div id="tree" class="mock-tree" role="tree" aria-label="Fleet"></div>

        <div class="mock-rail__heading mock-rail__heading--global">Global</div>
        <ul id="global-nav" class="mock-global"></ul>

        <div class="mock-rail__footer">
          <span class="mock-legend"><i class="mock-dot mock-dot--config"></i>config stream</span>
          <span class="mock-legend"><i class="mock-dot mock-dot--artifact"></i>artifact stream</span>
        </div>
      </nav>

      <!-- ── workspace: breadcrumb + selection header + level-scoped tabs + panel ──── -->
      <main class="mock-workspace">
        <nav id="breadcrumb" class="mock-breadcrumb" aria-label="Breadcrumb"></nav>
        <header id="selection-header" class="mock-selection"></header>
        <nav id="tabs" class="mock-tabs" role="tablist" aria-label="Views over the current selection"></nav>
        <section id="panel" class="mock-panel" role="tabpanel"></section>
      </main>
    </div>
  </div>

  <!-- Fixtures are plain JS (not JSON) so the mock opens straight from disk — no server needed.
       Two deliberately different hierarchies prove no level name is special. -->
  <script src="data/dallas.js"></script>
  <script src="data/northwind.js"></script>
  <script src="app.js"></script>
</body>
</html>
